<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Wallet QR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding: 15px;
}

/* CONTAINER */
.app {
  width: 100%;
  max-width: 420px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 20px;
  opacity: 0.9;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  outline: none;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* FILE */
.file {
  display: block;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
  margin-bottom: 12px;
}

.file input {
  display: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
  margin-top: 8px;
  background: linear-gradient(45deg, #7c3aed, #ec4899);
}

/* RESULT */
.result {
  margin-top: 20px;
  text-align: center;
}

#qr {
  margin-top: 15px;
}

/* ACTION BUTTONS */
.actions button {
  margin-top: 10px;
}

/* DESKTOP UPGRADE */
@media (min-width: 768px) {
  .app {
    max-width: 500px;
  }

  .card {
    padding: 30px;
  }

  #qr canvas {
    width: 300px !important;
    height: 300px !important;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="title">🦞LOBSTAR QR GENERATE🦞</div>

  <div class="card">

    <input id="wallet" placeholder="Enter wallet address">

    <label class="file">
      Upload Logo (Optional)
      <input type="file" id="logo" accept="image/*">
    </label>

    <button onclick="generateQR()">Generate QR</button>

    <div class="result">
      <div id="qr"></div>

      <div class="actions">
        <button onclick="copyWallet()">Copy Wallet</button>
        <button onclick="downloadQR()">Download QR</button>
      </div>
    </div>

  </div>

</div>

<script>
let qr;

function generateQR() {
  const wallet = document.getElementById("wallet").value.trim();
  const logoFile = document.getElementById("logo").files[0];

  if (!wallet) {
    alert("Wallet address is required");
    return;
  }

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  let logoURL = "";
  if (logoFile) {
    logoURL = URL.createObjectURL(logoFile);
  }

  qr = new QRCodeStyling({
    width: 260,
    height: 260,
    data: wallet,
    image: logoURL,

    dotsOptions: {
      color: "#000000",
      type: "rounded"
    },

    cornersSquareOptions: {
      type: "extra-rounded"
    },

    backgroundOptions: {
      color: "#ffffff"
    },

    imageOptions: {
      margin: 6
    }
  });

  qr.append(qrContainer);
}

function copyWallet() {
  const wallet = document.getElementById("wallet").value;
  navigator.clipboard.writeText(wallet);
  alert("Wallet copied");
}

function downloadQR() {
  if (qr) {
    qr.download({ name: "wallet-qr", extension: "png" });
  }
}
</script>

</body>
</html>
