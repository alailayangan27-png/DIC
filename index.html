<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lobstar ID</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="container">

  <h1 class="title">LOBSTAR ID</h1>

  <div class="form glass">
    <input id="name" placeholder="Nama">
    <input id="username" placeholder="@username">
    <input id="bio" placeholder="Bio singkat">
    <input id="skills" placeholder="Skill (Design, Coding)">
    
    <button onclick="generate()">Generate</button>
  </div>

  <div id="card" class="card glass hidden">

    <div class="top">
      <div class="avatar" id="avatar"></div>
      <div>
        <h2 id="cName"></h2>
        <p id="cUser"></p>
      </div>
    </div>

    <div class="divider"></div>

    <p id="cBio"></p>
    <p id="cSkills"></p>

    <canvas id="qr"></canvas>

    <button class="download" onclick="download()">Download</button>

  </div>

</div>

<script src="app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

</body>
</html>
