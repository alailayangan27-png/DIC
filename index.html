<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Wallet QR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #1e3a8a, #020617);
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  padding: 15px;
}

.app {
  width: 100%;
  max-width: 420px;
}

.title {
  text-align: center;
  font-size: 20px;
  margin-bottom: 20px;
  opacity: 0.9;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  outline: none;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.08);
  color: white;
}

/* FILE */
.file {
  display: block;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  background: rgba(255,255,255,0.08);
  cursor: pointer;
  margin-bottom: 12px;
}

.file input {
  display: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  background: linear-gradient(45deg, #7c3aed, #ec4899);
  transition: 0.2s;
}

button:hover {
  transform: scale(1.03);
  opacity: 0.9;
}

/* RESULT */
.result {
  margin-top: 20px;
  text-align: center;
}

/* ACTION BUTTONS */
.actions {
  margin-top: 15px;
}

.actions button {
  margin-top: 8px;
}

/* QR STYLE */
#qr canvas {
  border-radius: 16px;
  margin-top: 15px;
  box-shadow: 
    0 0 20px rgba(124, 58, 237, 0.6),
    0 0 40px rgba(236, 72, 153, 0.4);
}

/* DESKTOP */
@media (min-width: 768px) {
  .app {
    max-width: 500px;
  }

  .card {
    padding: 30px;
  }

  #qr canvas {
    width: 300px !important;
    height: 300px !important;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="title">🦞Lobstar QR Generate🦞</div>

  <div class="card">

    <input id="wallet" placeholder="Enter wallet address">

    <label class="file">
      Upload Logo (Optional)
      <input type="file" id="logo" accept="image/*">
    </label>

    <button onclick="generateQR()">Generate QR</button>

    <div class="result">
      <div id="qr"></div>

      <!-- hidden dulu -->
      <div id="actions" class="actions" style="display:none;">
        <button onclick="copyWallet()">Copy Wallet</button>
        <button onclick="downloadQR()">Download QR</button>
      </div>
    </div>

  </div>

</div>

<script>
let qr;
let currentWallet = "";

/* GENERATE QR */
function generateQR() {
  const wallet = document.getElementById("wallet").value.trim();
  const logoFile = document.getElementById("logo").files[0];

  if (!wallet) {
    alert("Please enter wallet address");
    return;
  }

  currentWallet = wallet;

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  let logoURL = "";
  if (logoFile) {
    logoURL = URL.createObjectURL(logoFile);
  }

  qr = new QRCodeStyling({
    width: 260,
    height: 260,
    data: wallet,
    image: logoURL,

    dotsOptions: {
      color: "#7c3aed",
      type: "rounded"
    },

    cornersSquareOptions: {
      type: "extra-rounded",
      color: "#ec4899"
    },

    backgroundOptions: {
      color: "#ffffff"
    },

    imageOptions: {
      margin: 6
    }
  });

  qr.append(qrContainer);

  // tampilkan tombol setelah generate
  document.getElementById("actions").style.display = "block";
}

/* COPY */
function copyWallet() {
  if (!currentWallet) {
    alert("Generate QR first");
    return;
  }

  navigator.clipboard.writeText(currentWallet);
  alert("Wallet copied");
}

/* DOWNLOAD */
function downloadQR() {
  if (!qr) {
    alert("Generate QR first");
    return;
  }

  qr.download({
    name: "wallet-qr",
    extension: "png"
  });
}
</script>

</body>
</html>
