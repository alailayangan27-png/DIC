<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Solana QR Premium</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- QR PREMIUM -->
  <script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>
</head>
<body>

<div class="container">

  <h1>💸 Solana QR Premium</h1>

  <input id="wallet" placeholder="Masukkan alamat wallet">
  <input id="amount" placeholder="Jumlah SOL (opsional)">

  <button onclick="generateQR()">Generate QR</button>

  <div id="result" class="hidden">
    <p id="walletText"></p>

    <div id="qr"></div>

    <button onclick="copyWallet()">Copy</button>
    <button onclick="downloadQR()">Download HD</button>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
