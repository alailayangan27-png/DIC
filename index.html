<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Wallet QR</title>

  <link rel="stylesheet" href="style.css">

  <!-- QR Library -->
  <script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>
</head>
<body>

<div class="app">

  <h1>💎 Premium Wallet QR</h1>

  <div class="form">
    <input id="name" placeholder="Full Name">
    <input id="username" placeholder="@username">
    <input id="bio" placeholder="Short description">
    <input id="wallet" placeholder="Wallet address">

    <label class="upload">
      Upload Logo
      <input type="file" id="logo" accept="image/*">
    </label>

    <button onclick="generateQR()">Generate QR</button>
  </div>

  <div id="card" class="card hidden">

    <div class="profile">
      <div class="avatar" id="avatar">A</div>
      <div>
        <h2 id="outName"></h2>
        <p id="outUsername"></p>
      </div>
    </div>

    <p class="bio" id="outBio"></p>
    <p class="wallet" id="outWallet"></p>

    <div id="qr"></div>

    <div class="actions">
      <button onclick="copyWallet()">Copy</button>
      <button onclick="downloadQR()">Download</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
