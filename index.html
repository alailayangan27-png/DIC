<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolQR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  min-height: 100vh;
  background: #0a0a0a;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #e5e5e5;
}

/* CONTAINER */
.app {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 18px;
  margin-bottom: 18px;
  color: #aaa;
  letter-spacing: 0.5px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 18px;
  padding: 18px;
}

/* INPUT */
input {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.06);
  background: #111;
  color: #fff;
  margin-bottom: 10px;
}

/* FILE */
.file {
  display: block;
  padding: 13px;
  border-radius: 12px;
  text-align: center;
  background: #111;
  border: 1px dashed rgba(255,255,255,0.1);
  cursor: pointer;
  margin-bottom: 10px;
  font-size: 13px;
}

.file input {
  display: none;
}

/* COLOR PICKER */
.color {
  width: 100%;
  height: 45px;
  border: none;
  margin-bottom: 10px;
  background: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 13px;
  border-radius: 12px;
  border: none;
  font-weight: 500;
  color: white;
  cursor: pointer;
  margin-top: 8px;
  background: #2563eb;
  transition: 0.2s;
}

button:hover {
  background: #1d4ed8;
  box-shadow: 0 0 12px rgba(37,99,235,0.4);
}

/* RESULT */
.result {
  margin-top: 18px;
  text-align: center;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.3s;
}

.result.show {
  opacity: 1;
  transform: translateY(0);
}

/* ACTIONS */
.actions {
  margin-top: 12px;
}

.actions button {
  background: #1f2937;
}

.actions button:hover {
  background: #374151;
}

/* QR */
#qr canvas {
  margin-top: 12px;
  border-radius: 14px;
  box-shadow: 0 0 20px rgba(37,99,235,0.25);
}

/* DESKTOP */
@media (min-width: 768px) {
  .app {
    max-width: 480px;
  }

  #qr canvas {
    width: 300px !important;
    height: 300px !important;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="title">SolQR • Clean Generator</div>

  <div class="card">

    <input id="wallet" placeholder="Wallet address">

    <label class="file">
      Upload logo (optional)
      <input type="file" id="logo" accept="image/*">
    </label>

    <input type="color" id="color" class="color" value="#2563eb">

    <button onclick="generateQR()">Generate QR</button>

    <div id="result" class="result">
      <div id="qr"></div>

      <div id="actions" class="actions" style="display:none;">
        <button onclick="copyWallet()">Copy</button>
        <button onclick="downloadQR()">Download</button>
      </div>
    </div>

  </div>

</div>

<script>
let qr;
let currentWallet = "";

function generateQR() {
  const wallet = document.getElementById("wallet").value.trim();
  const color = document.getElementById("color").value;
  const logoFile = document.getElementById("logo").files[0];

  if (!wallet) return alert("Enter wallet");

  currentWallet = wallet;

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  let logoURL = logoFile ? URL.createObjectURL(logoFile) : "";

  qr = new QRCodeStyling({
    width: 260,
    height: 260,
    data: wallet,
    image: logoURL,

    dotsOptions: {
      color: color,
      type: "rounded"
    },

    cornersSquareOptions: {
      type: "extra-rounded",
      color: color
    },

    backgroundOptions: {
      color: "#ffffff"
    }
  });

  qr.append(qrContainer);

  document.getElementById("actions").style.display = "block";
  document.getElementById("result").classList.add("show");
}

function copyWallet() {
  if (!currentWallet) return alert("Generate first");
  navigator.clipboard.writeText(currentWallet);
}

function downloadQR() {
  if (!qr) return alert("Generate first");
  qr.download({ name: "solqr", extension: "png" });
}
</script>

</body>
</html>
