<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolQR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(-45deg, #020617, #1e3a8a, #7c3aed, #ec4899);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  color: white;
}

@keyframes gradientMove {
  0% { background-position: 0% }
  50% { background-position: 100% }
  100% { background-position: 0% }
}

.app {
  width: 100%;
  max-width: 420px;
  padding: 15px;
}

.title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 20px;
  letter-spacing: 1px;
}

/* GLASS CARD */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border-radius: 22px;
  padding: 20px;
  box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  outline: none;
  margin-bottom: 12px;
  background: rgba(255,255,255,0.1);
  color: white;
}

/* FILE */
.file {
  display: block;
  padding: 14px;
  border-radius: 14px;
  text-align: center;
  background: rgba(255,255,255,0.1);
  cursor: pointer;
  margin-bottom: 12px;
}

.file input {
  display: none;
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  color: white;
  cursor: pointer;
  margin-top: 10px;
  background: linear-gradient(45deg, #7c3aed, #ec4899);
  transition: 0.25s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(236,72,153,0.6);
}

/* RESULT */
.result {
  margin-top: 20px;
  text-align: center;
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}

/* ACTIONS */
.actions {
  margin-top: 15px;
}

.actions button {
  margin-top: 8px;
}

/* QR STYLE */
#qr canvas {
  border-radius: 16px;
  margin-top: 15px;
  box-shadow: 
    0 0 25px rgba(124,58,237,0.7),
    0 0 50px rgba(236,72,153,0.5);
}

/* DESKTOP */
@media (min-width: 768px) {
  .app {
    max-width: 500px;
  }

  .card {
    padding: 30px;
  }

  #qr canvas {
    width: 300px !important;
    height: 300px !important;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="title">💎 SolQR Generator</div>

  <div class="card">

    <input id="wallet" placeholder="Enter wallet address">

    <label class="file">
      Upload Logo (Optional)
      <input type="file" id="logo" accept="image/*">
    </label>

    <button onclick="generateQR()">Generate QR</button>

    <div class="result">
      <div id="qr"></div>

      <div id="actions" class="actions" style="display:none;">
        <button onclick="copyWallet()">Copy Wallet</button>
        <button onclick="downloadQR()">Download QR</button>
      </div>
    </div>

  </div>

</div>

<script>
let qr;
let currentWallet = "";

function generateQR() {
  const wallet = document.getElementById("wallet").value.trim();
  const logoFile = document.getElementById("logo").files[0];

  if (!wallet) {
    alert("Enter wallet first");
    return;
  }

  currentWallet = wallet;

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  let logoURL = logoFile ? URL.createObjectURL(logoFile) : "";

  qr = new QRCodeStyling({
    width: 260,
    height: 260,
    data: wallet,
    image: logoURL,

    dotsOptions: {
      color: "#7c3aed",
      type: "rounded"
    },

    cornersSquareOptions: {
      type: "extra-rounded",
      color: "#ec4899"
    },

    backgroundOptions: {
      color: "#ffffff"
    }
  });

  qr.append(qrContainer);

  document.getElementById("actions").style.display = "block";
}

function copyWallet() {
  if (!currentWallet) return alert("Generate QR first");
  navigator.clipboard.writeText(currentWallet);
  alert("Copied 🚀");
}

function downloadQR() {
  if (!qr) return alert("Generate QR first");
  qr.download({ name: "solqr", extension: "png" });
}
</script>

</body>
</html>
