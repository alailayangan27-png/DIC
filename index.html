<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SolQR</title>

<script src="https://unpkg.com/qr-code-styling@1.6.0/lib/qr-code-styling.js"></script>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Inter, sans-serif;
}

body {
  background: #0b0b0c;
  color: #e4e4e7;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

/* CONTAINER */
.app {
  width: 100%;
  max-width: 420px;
  padding: 16px;
}

/* TITLE */
.title {
  text-align: center;
  font-size: 16px;
  color: #71717a;
  margin-bottom: 16px;
}

/* CARD (GOLD PREMIUM) */
.card {
  background: linear-gradient(180deg, #111113 70%, rgba(255,200,0,0.08));
  border: 1px solid rgba(255, 200, 0, 0.5);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 
    0 0 25px rgba(255, 200, 0, 0.15),
    inset 0 -20px 40px rgba(255, 200, 0, 0.05);
  transition: 0.3s;
}

.card:hover {
  box-shadow: 
    0 0 40px rgba(255, 200, 0, 0.25),
    inset 0 -30px 60px rgba(255, 200, 0, 0.08);
}

/* INPUT */
input {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #1f1f23;
  background: #0f0f11;
  color: white;
  margin-bottom: 12px;
}

/* FILE */
.file {
  display: block;
  padding: 14px;
  border-radius: 12px;
  text-align: center;
  background: #0f0f11;
  border: 1px dashed #2a2a2f;
  cursor: pointer;
  margin-bottom: 12px;
  font-size: 13px;
  transition: 0.2s;
}

/* FILE ACTIVE */
.file.active {
  border: 1px solid #22c55e;
  color: #22c55e;
  box-shadow: 0 0 10px rgba(34,197,94,0.3);
}

/* BUTTON */
button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-weight: 600;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.25s ease;
}

/* PRIMARY */
.primary {
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  box-shadow: 0 4px 15px rgba(37,99,235,0.3);
}

.primary:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 20px rgba(37,99,235,0.5);
}

/* SECONDARY */
.secondary {
  background: #18181b;
  color: #d4d4d8;
  border: 1px solid #2a2a2f;
}

.secondary:hover {
  background: #27272a;
  border-color: #3f3f46;
}

/* RESULT */
.result {
  margin-top: 18px;
  text-align: center;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.3s;
}

.result.show {
  opacity: 1;
  transform: translateY(0);
}

/* QR */
#qr canvas {
  margin-top: 14px;
  border-radius: 16px;
  box-shadow: 0 0 20px rgba(37,99,235,0.25);
}

/* ACTIONS */
.actions {
  margin-top: 14px;
}

/* DESKTOP */
@media (min-width: 768px) {
  .app {
    max-width: 480px;
  }

  #qr canvas {
    width: 300px !important;
    height: 300px !important;
  }
}
</style>
</head>

<body>

<div class="app">

  <div class="title">🦞QR GENERATE🦞</div>

  <div class="card">

    <input id="wallet" placeholder="Wallet address">

    <label class="file" id="fileBox">
      <span id="fileText">Upload logo</span>
      <input type="file" id="logo" accept="image/*">
    </label>

    <button class="primary" onclick="generateQR()">Generate QR</button>

    <div id="result" class="result">
      <div id="qr"></div>

      <div id="actions" class="actions" style="display:none;">
        <button class="secondary" onclick="copyWallet()">Copy wallet</button>
        <button class="secondary" onclick="downloadQR()">Download QR</button>
      </div>
    </div>

  </div>

</div>

<script>
let qr;
let currentWallet = "";

/* FILE CHECK (NO BUG) */
document.getElementById("logo").addEventListener("change", function() {
  const fileBox = document.getElementById("fileBox");
  const fileText = document.getElementById("fileText");

  if (this.files.length > 0) {
    fileBox.classList.add("active");
    fileText.innerText = "✔ Logo selected";
  }
});

function generateQR() {
  const wallet = document.getElementById("wallet").value.trim();
  const logoFile = document.getElementById("logo").files[0];

  if (!wallet) return alert("Enter wallet");

  currentWallet = wallet;

  const qrContainer = document.getElementById("qr");
  qrContainer.innerHTML = "";

  let logoURL = logoFile ? URL.createObjectURL(logoFile) : "";

  qr = new QRCodeStyling({
    width: 260,
    height: 260,
    data: wallet,
    image: logoURL,

    dotsOptions: {
      color: "#2563eb",
      type: "rounded"
    },

    cornersSquareOptions: {
      type: "extra-rounded",
      color: "#2563eb"
    },

    backgroundOptions: {
      color: "#ffffff"
    },

    imageOptions: {
      margin: 6,
      imageSize: 0.43,
      hideBackgroundDots: true
    }
  });

  qr.append(qrContainer);

  document.getElementById("actions").style.display = "block";
  document.getElementById("result").classList.add("show");
}

function copyWallet() {
  if (!currentWallet) return alert("Generate first");
  navigator.clipboard.writeText(currentWallet);
}

function downloadQR() {
  if (!qr) return alert("Generate first");
  qr.download({ name: "solqr", extension: "png" });
}
</script>

</body>
</html>
